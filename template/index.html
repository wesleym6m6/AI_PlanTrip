<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行計畫</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23f5f5f5'/><text x='90' y='130' font-size='120' text-anchor='middle'>🗺️</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='16' y='26' font-size='28' text-anchor='middle'>🗺️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}

.top-bar{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;padding:24px 20px;text-align:center}
.top-bar h1{font-size:22px;font-weight:700}
.top-bar p{font-size:13px;opacity:.85;margin-top:4px}

.trips{max-width:600px;margin:20px auto;padding:0 12px}

.trip-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-decoration:none;color:inherit;display:block;transition:transform .15s,box-shadow .15s}
.trip-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.trip-card:active{transform:translateY(0)}

.trip-card h2{font-size:17px;font-weight:600;color:#1a5276;margin-bottom:6px}
.trip-card .meta{font-size:13px;color:#888;margin-bottom:8px}
.trip-card .cities{display:flex;gap:6px;flex-wrap:wrap}
.trip-card .city-tag{background:#e8f0fe;color:#1a5276;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}

.empty{text-align:center;padding:60px 20px;color:#999;font-size:14px}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🌏 旅行計畫</h1>
  <p>所有旅行一覽</p>
</div>

<div class="trips">
{% if trips %}
{% for t in trips %}
  <a class="trip-card" href="{{ t.slug }}/">
    <h2>{{ t.title }}</h2>
    <div class="meta">{{ t.date_range }}</div>
    <div class="cities">
      {% for city in t.cities %}
      <span class="city-tag">{{ city }}</span>
      {% endfor %}
    </div>
  </a>
{% endfor %}
{% else %}
  <div class="empty">還沒有旅行計畫，用 /trip-planner 開始規劃吧！</div>
{% endif %}
</div>

</body>
</html>
